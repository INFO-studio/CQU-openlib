[build]
  command = "pnpm build"
  publish = "build/client"

[build.environment]
  NODE_VERSION = "22"
  PNPM_VERSION = "11.15.1"

# Keep in sync with public/_redirects (copied into publish dir).
# Missing /doc/* → plain 404 body (not index.html). Existing /doc files
# still win via CDN shadowing so /doc/club/index.md is served normally.
[[redirects]]
  from = "/doc/*"
  to = "/doc-not-found.txt"
  status = 404

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
